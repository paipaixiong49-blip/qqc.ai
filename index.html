      padding: 40px 30px;
      max-width: 400px;
      text-align: center;
    }
    .age-gate-box h2 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #4ade80;
    }
    .age-gate-box p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .age-gate-btns {
      display: flex;
      gap: 12px;
      flex-direction: column;
    }
    .btn-primary {

      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-secondary {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 主内容 */
    .main-container {
      max-width: 420px;
      width: 100%;
      display: none;
    }
    .main-container.active { display: block; }
    
    .card {
      background: rgba(20, 40, 35, 0.6);
      border: 1px solid #2d5a4a;
      border-radius: 20px;
      padding: 30px 24px;
      backdrop-filter: blur(10px);
    }
    
    .logo-box {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-box img {
      max-width: 80%;
      height: auto;
    }
    .logo-text {
      color: #22c55e;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 8px;
    }
    .logo-subtitle {
      color: #64748b;
      font-size: 14px;
      letter-spacing: 4px;
      margin-top: 4px;
    }

    .preview-img {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1e293b, #334155);
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      filter: blur(2px);
    }
    .preview-img::after {
      content: "🔒 完整版需下载 APP";
      position: absolute;
      color: white;
      font-size: 16px;
      font-weight: 600;
      filter: blur(0);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 8px;
    }

    .status-text {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .title {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-bar-inner {
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      border-radius: 2px;
    }

    .download-btn {
      width: 100%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(34, 197, 94, 0.6);
    }

    .features {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.8;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: #475569;
      font-size: 11px;
      line-height: 1.6;

  </style>
</head>
<body>

      © 2026 青青草视频 · 所有权利保留
    </div>
  </div>

  <script>
    // 检查是否已确认年龄（保存在 localStorage）
    if (localStorage.getItem('age_confirmed') === 'true') {
      document.getElementById('ageGate').style.display = 'none';
      document.getElementById('mainContent').classList.add('active');
    }

    function confirmAge() {
      localStorage.setItem('age_confirmed', 'true');
      document.getElementById('ageGate').style.display = 'none';
      document.getElementById('mainContent').classList.add('active');
    }

    function goDownload() {
      // ⬇️ 这里改成你的真实下载链接
      window.location.href = 'https://93kkp.xyz
/download';

</html>
